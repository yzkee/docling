site_name: Docling
site_url: https://docling-project.github.io/docling/
repo_name: docling-project/docling
repo_url: https://github.com/docling-project/docling

theme:
  variant: modern
  # name: material
  custom_dir: docs/overrides
  palette:
    # Default dark mode
    - scheme: slate
      primary: deep orange #black
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to light mode

    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      # primary: black
      primary: deep orange #black
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

    # System preference (dark)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange #black
      accent: orange
      # primary: deep orange #black
      toggle:
        icon: material/brightness-auto
        name: Switch to system preference

  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - announce.dismiss
    - navigation.footer
    - navigation.tabs
    - navigation.indexes  # <= if set, each "section" can have its own page, if index.md is used
    - navigation.instant
    - navigation.instant.prefetch
    # - navigation.instant.preview
    - navigation.instant.progress
    - navigation.path
    # - navigation.sections  # <= if set, navigation menus will not collapse and expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow
