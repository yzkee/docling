markdown_extensions:
  - pymdownx.critic
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.emoji:
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji 
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  # Required by mkdocstrings under Zensical: mkdocs-autorefs is normally
  # auto-registered by MkDocs as a plugin, but Zensical's preliminary
  # mkdocstrings integration expects it as a markdown extension.
  - mkdocs_autorefs._internal.references:AutorefsExtension
plugins:
  - redirects:
      redirect_maps:
        getting_started/index.md: index.md
        installation/index.md: getting_started/installation.md
        usage/index.md: getting_started/quickstart.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            extensions:
              - griffe_pydantic:
                  schema: true
            preload_modules:
              - docling_core

