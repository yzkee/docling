      link: https://github.com/docling-project/docling
    - icon: fontawesome/brands/discord
      link: https://docling.ai/discord
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/docling/
  analytics:
    provider: google
    property: G-MP75NXFDH4
